<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Admin — Matrix Bank</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <canvas id="matrix-bg"></canvas>

  <!-- Login -->
  <section id="admin-login" class="auth-screen">
    <div class="auth-card">
      <div class="auth-logo">// ADMIN</div>
      <div class="auth-subtitle">SHARK TANK CONTROL</div>
      <div class="field">
        <label>Senha do host</label>
        <input id="admin-pwd" type="password" autocomplete="off" />
      </div>
      <div class="error" id="admin-err"></div>
      <button id="admin-login-btn" class="btn">ENTRAR</button>
    </div>
  </section>

  <!-- Panel -->
  <main id="admin-panel" class="admin-wrap" style="display:none">
    <h1 class="admin-title">MATRIX BANK / ADMIN</h1>

    <div class="admin-panel">
      <h3>+ Novo case</h3>
      <div class="field">
        <label>Empresa / Nome do pitch</label>
        <input id="new-company" type="text" placeholder="Ex: TechShark" />
      </div>
      <div class="field">
        <label>Descricao do pitch</label>
        <textarea id="new-pitch" placeholder="O que a empresa faz, mercado, problema..."></textarea>
      </div>
      <div class="grid-2">
        <div class="field">
          <label>Valor pedido</label>
          <input id="new-ask" type="number" min="1" placeholder="100000" />
        </div>
        <div class="field">
          <label>Equity (%)</label>
          <input id="new-equity" type="number" min="0.1" max="100" step="0.1" placeholder="10" />
        </div>
      </div>
      <div class="error" id="new-err"></div>
      <button id="new-btn" class="btn">PUBLICAR CASE</button>
    </div>

    <div class="admin-panel">
      <h3>Cases</h3>
      <div id="cases-list">
        <div class="empty">Carregando...</div>
      </div>
    </div>

    <div class="admin-panel">
      <h3>Investidores</h3>
      <div id="users-list">
        <div class="empty">Carregando...</div>
      </div>
    </div>

    <div class="admin-panel">
      <h3>Configuracao</h3>
      <div class="grid-2">
        <div class="field">
          <label>Saldo inicial dos novos jogadores</label>
          <input id="starting-balance" type="number" min="0" />
        </div>
        <div class="field" style="align-self:end;">
          <button id="save-starting" class="btn secondary small">SALVAR</button>
        </div>
      </div>
      <hr class="sep" />
      <div class="grid-2">
        <button id="reset-keep" class="btn secondary small">Reset (mantem jogadores)</button>
        <button id="reset-all" class="btn danger small">Reset TOTAL</button>
      </div>
      <hr class="sep" />
      <button id="admin-logout" class="btn secondary small">SAIR DO ADMIN</button>
    </div>

    <p style="text-align:center;font-size:11px;color:var(--text-dim);letter-spacing:2px;">
      <a href="/" style="color:var(--green);">Ver como jogador -&gt;</a>
    </p>
  </main>

  <div id="toast-host"></div>

  <script src="/js/matrix.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
